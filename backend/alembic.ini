# Alembic config for Relay backend.
#
# Usage:
#   alembic -c backend/alembic.ini upgrade head
#   alembic -c backend/alembic.ini revision -m "…"   # not expected in hackathon scope
#
# env.py reads DATABASE_URL (normalized to asyncpg) from Pydantic Settings.
# No sqlalchemy.url here — the env.py is the single source of truth.

[alembic]
script_location = backend/db/migrations
prepend_sys_path = .
version_path_separator = os
timezone = UTC

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
